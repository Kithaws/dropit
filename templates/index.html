<!DOCTYPE html>
<html lang="en">
<head>
    <title>DropIt</title>
    <script type="module" src="/static/script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #080808;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        body::after {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(32px) saturate(150%);
            -webkit-backdrop-filter: blur(32px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 56px 44px 52px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 24px 80px rgba(0,0,0,0.7);
            animation: rise 0.55s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 48px; height: 2px;
            background: #ffffff;
            border-radius: 0 0 2px 2px;
        }

        .eyebrow {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.95;
            color: #ffffff;
            margin-bottom: 14px;
        }

        .tagline {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 48px;
        }

        form { display: flex; justify-content: center; }

        button {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #080808;
            padding: 14px 36px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #ffffff;
            box-shadow: 0 4px 24px rgba(255,255,255,0.15);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s;
            -webkit-font-smoothing: antialiased;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255,255,255,0.25);
        }

        button:active {
            transform: translateY(0);
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="eyebrow">File sharing</p>
        <h1>DropIt</h1>
        <p class="tagline">Drop · Scan · Download</p>
        <form action="/create-room" method="post">
            <button type="submit">Create Room</button>
        </form>
    </div>
</body>
</html>
