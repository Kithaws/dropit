<!DOCTYPE html>
<html>
<head>
    <title>Room</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>Room: {{ room_id }}</h2>

        <img src="{{ qr_image }}" width="200">

        <h3>Upload File</h3>
        <form action="/upload/{{ room_id }}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>

        <h3>Download</h3>
        <a href="/download/{{ room_id }}">Download File</a>
    </div>
</body>
</html>
