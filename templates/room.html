<!DOCTYPE html>
<html>
<head>
    <title>DropIt - Room</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- firebase client module (kept separate so UI/theme not altered) -->
    <script type="module" src="/static/script.js"></script>
</head>
<body>

    <div class="container">

        <h1>📂 DropIt Room</h1>

        <h3>Room ID: {{ room_id }}</h3>

        <hr>

        <!-- FILE SHARING SECTION -->
        <h2>Share a File</h2>
        <div class="upload-area">
            <p>Click or drag a file here to upload</p>
            <input type="file" name="file" id="file-input">
        </div>
        {% if has_file %}
            <div id="file-display" class="text-box" style="margin-top:10px;">
                <a href="/download/{{ room_id }}" target="_blank">Download file</a>
            </div>
        {% else %}
            <div id="file-display" class="text-box" style="margin-top:10px;"></div>
        {% endif %}

        <hr>

        <!-- TEXT SHARING SECTION -->
        <h2>Send Text</h2>
        <form action="/send-text/{{ room_id }}" method="post">
            <textarea 
                name="text" 
                rows="5" 
                placeholder="Type your message here..." 
                required></textarea>
            <br>
            <button type="submit">Send Text</button>
        </form>

        <hr>

        <a href="/">
            <button>Create New Room</button>
        </a>

    </div>

</body>
</html>
