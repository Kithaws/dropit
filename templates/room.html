<!DOCTYPE html>
<html lang="en">
<head>
    <title>DropIt — Room</title>
    <script type="module" src="/static/script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 52px 24px 80px;
            background: #080808;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        body::after {
            content: '';
            position: fixed;
            width: 800px; height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(32px) saturate(150%);
            -webkit-backdrop-filter: blur(32px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 44px 44px 48px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 24px 80px rgba(0,0,0,0.7);
            animation: rise 0.55s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 44px;
            width: 40px; height: 2px;
            background: #ffffff;
            border-radius: 0 0 2px 2px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #ffffff;
            line-height: 1;
        }

        .room-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.67rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 6px 12px;
        }

        .room-chip::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 28px 0;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 14px;
        }

        .upload-area {
            position: relative;
            padding: 30px 20px;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.3);
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
            margin-bottom: 12px;
        }

        .upload-area:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
        }

        .upload-area p {
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            pointer-events: none;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .text-box {
            padding: 13px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            min-height: 44px;
        }

        .text-box a {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: rgba(255,255,255,0.35);
            transition: text-decoration-color 0.15s;
        }

        .text-box a:hover { text-decoration-color: rgba(255,255,255,0.9); }

        textarea {
            display: block;
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.88);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 300;
            line-height: 1.7;
            resize: vertical;
            min-height: 110px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea::placeholder { color: rgba(255,255,255,0.2); }

        textarea:focus {
            border-color: rgba(255,255,255,0.35);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
        }

        button {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #080808;
            padding: 13px 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(255,255,255,0.12);
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            -webkit-font-smoothing: antialiased;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255,255,255,0.22);
        }

        button:active {
            transform: translateY(0);
            background: #d8d8d8;
        }

        .btn-ghost {
            background: transparent;
            color: rgba(255,255,255,0.45);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: none;
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8);
            box-shadow: none;
        }

        .btn-ghost:active { background: rgba(255,255,255,0.08); }

        a { text-decoration: none; }

        #live-text {
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.7);
            padding: 13px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 0.85rem;
        }

        img {
            max-width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>DropIt</h1>
            <div class="room-chip">{{ room_id }}</div>
        </div>

        <p class="section-label">Share a File</p>
        <div class="upload-area">
            <p>Click or drag a file here to upload</p>
            <input type="file" name="file" id="file-input">
        </div>
        {% if has_file %}
            <div id="file-display" class="text-box">
                <a href="/download/{{ room_id }}" target="_blank">Download file</a>
            </div>
        {% else %}
            <div id="file-display" class="text-box"></div>
        {% endif %}

        <div class="divider"></div>

        <p class="section-label">Send Text</p>
        <form action="/send-text/{{ room_id }}" method="post">
            <textarea name="text" placeholder="Type your message here…" required></textarea>
            <button type="submit">Send Text</button>
        </form>

        <div class="divider"></div>

        <a href="/"><button class="btn-ghost">New Room</button></a>

    </div>
</body>
</html>
